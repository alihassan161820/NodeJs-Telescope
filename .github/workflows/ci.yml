name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Dashboard uses native Tailwind bindings that may not be available.
      # It ships as a pre-built SPA, so we skip its build in CI.
      - run: node -e "const p=require('./packages/dashboard/package.json'); p.scripts.build='echo skipped'; require('fs').writeFileSync('./packages/dashboard/package.json', JSON.stringify(p,null,2))"

      - run: pnpm build

      - run: pnpm test

      - run: pnpm lint
